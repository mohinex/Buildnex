<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eurosia Buildnex</title>
    
    <!-- Tab Branding & Favicons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- PWA settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-title" content="Eurosia Buildnex" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#cc1a2f" />

    <!-- Social Sharing Preview (Open Graph) -->
    <meta property="og:title" content="Eurosia Buildnex - Modern Construction Operating System" />
    <meta property="og:description" content="Eurosia Buildnex is the complete offline-first smart construction ERP platform for modern builders. Manage project structures, client bookings, sub-contractors, and material costs cleanly." />
    <meta property="og:image" content="/logo-og.png" />
    <meta property="og:url" content="https://eurosia-buildnex.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Eurosia Buildnex" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Eurosia Buildnex - Modern Construction Operating System" />
    <meta name="twitter:description" content="Eurosia Buildnex is the complete offline-first smart construction ERP platform for modern builders." />
    <meta name="twitter:image" content="/logo-og.png" />

    <!-- SEO Schema.org Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Eurosia Buildnex",
      "url": "https://eurosia-buildnex.com",
      "logo": "https://eurosia-buildnex.com/logo-512.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+8801711408725",
        "contactType": "customer service"
      }
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- PWA Instant Branded Splash Screen (Requirement 15) -->
      <style>
        .splash-container {
          position: fixed;
          inset: 0;
          background-color: #050505;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 99999;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .splash-logo {
          width: 96px;
          height: 96px;
          margin-bottom: 24px;
          animation: pulse-scale 2s infinite ease-in-out;
        }
        .splash-spinner {
          width: 32px;
          height: 32px;
          border: 2px solid rgba(204, 26, 47, 0.1);
          border-top: 2px solid #cc1a2f;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        @keyframes pulse-scale {
          0%, 100% { transform: scale(1); opacity: 0.95; }
          50% { transform: scale(1.05); opacity: 1; }
        }
        @keyframes spin {
          100% { transform: rotate(360deg); }
        }
      </style>
      <div class="splash-container">
        <img class="splash-logo" src="/logo.svg" alt="Eurosia Buildnex Logo" />
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
